{% extends "base.html" %}

{% block navbar %}
  <li><a href="{{ url_for('index') }}" style="color: white;"><i class="bi bi-house navicon"></i> Home</a></li>
  <li><a href="{{ url_for('admin_login') }}" style="color: white;"><i class="bi bi-shield-lock navicon"></i> Admin</a></li>
  <li class="dropdown">
    <a href="#" style="color: yellow;">
      <i class="bi bi-person navicon"></i>
      <span><b>User</b></span>
      <i class="bi bi-chevron-down toggle-dropdown"></i>
    </a>
    <ul>
      <li><a href="{{ url_for('user_register') }}" style="color: white;">Register</a></li>
      <li><a href="{{ url_for('user_login') }}" style="color: yellow;"><b>Log In</b></a></li>
    </ul>
  </li>
{% endblock navbar %}

{% block extra_style %}
<style>
  /* ── Page ── */
  #contact.contact.section {
    background-color: #FFFDD0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: clamp(24px, 5vw, 60px) 0;
  }

  .section-heading { font-size: clamp(1.2rem, 3.5vw, 1.8rem); font-weight: 700; }

  /* ── Card ── */
  .form-card {
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    padding: clamp(16px, 3vw, 28px);
    overflow: hidden;
  }

  /* ── Form table ── */
  .form-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    border-radius: 10px;
    overflow: hidden;
  }

  .form-table th {
    width: 30%;
    font-weight: 600;
    color: #334155;
    font-size: clamp(0.82rem, 1.3vw, 0.95rem);
    padding: clamp(10px, 1.5vw, 14px) clamp(10px, 1.5vw, 16px);
    border-bottom: 1px solid #e2e8f0;
    vertical-align: middle;
    background: #f8fafc;
  }

  .form-table td {
    padding: clamp(8px, 1.3vw, 12px) clamp(10px, 1.5vw, 16px);
    border-bottom: 1px solid #e2e8f0;
    background: #ffffff;
  }

  .form-table tr:last-child th,
  .form-table tr:last-child td { border-bottom: none; }

  .form-table .form-control {
    background-color: #f0f8ff;
    border: 1px solid #cfe2ff;
    border-radius: 6px;
    font-size: clamp(0.82rem, 1.3vw, 0.95rem);
  }
  .form-table .form-control:focus {
    border-color: #0d6efd;
    box-shadow: 0 0 0 0.15rem rgba(13,110,253,0.15);
  }

  /* ── Submit row ── */
  .submit-row {
    background: #f8fafc;
    text-align: center;
    padding: clamp(14px, 2vw, 18px);
  }
  .submit-row .btn {
    font-size: clamp(0.85rem, 1.4vw, 1rem);
    padding: 10px 40px;
    width: 100%;
    max-width: 200px;
  }

  /* ── Stack on very small screens ── */
  @media (max-width: 400px) {
    .form-table tr        { display: flex; flex-direction: column; }
    .form-table th,
    .form-table td        { width: 100%; border-bottom: none; padding: 6px 12px; }
    .form-table th        { padding-bottom: 2px; background: none; font-size: 0.82rem; }
  }
</style>
{% endblock extra_style %}

{% block content %}
  <section id="contact" class="contact section" style="background-color: #FFFDD0; min-height: 100vh;">

    <div class="container text-center mb-3" data-aos="fade-up">
      <h2 class="section-heading">User Login</h2>
    </div>

    <div class="container" data-aos="fade-up" data-aos-delay="100">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7 col-sm-10 col-12">

          <div class="form-card">
            <form action="{{ url_for('user_login') }}"
                  method="post"
                  class="php-email-form">

              <table class="form-table">
                <tbody>
                  <tr>
                    <th>Email</th>
                    <td>
                      <input type="email" name="email"
                             class="form-control" required
                             style="background-color:#f0f8ff;">
                    </td>
                  </tr>
                  <tr>
                    <th>Password</th>
                    <td>
                      <input type="password" name="password"
                             class="form-control" required
                             style="background-color:#f0f8ff;">
                    </td>
                  </tr>
                  <tr>
                    <td colspan="2" class="submit-row">
                      <button type="submit" class="btn btn-primary px-5 py-2">
                        Log In
                      </button>
                    </td>
                  </tr>
                </tbody>
              </table>

            </form>
          </div>

        </div>
      </div>
    </div>

  </section>
{% endblock content %}
